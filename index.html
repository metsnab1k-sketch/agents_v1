<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Executive & Life Team</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f2;color:#1a1a1a;min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:24px 20px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
h1.dash-title{font-size:20px;font-weight:600}
.dash-sub{font-size:12px;color:#888;margin-top:3px}
.sw{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:7px 12px;width:220px}
.sw input{border:none;background:transparent;font-size:13px;color:#1a1a1a;outline:none;width:100%}
.mode-bar{display:flex;gap:0;background:#fff;border:1.5px solid #ddd;border-radius:12px;padding:4px;margin-bottom:20px;width:fit-content}
.mode-btn{font-size:13px;font-weight:500;padding:8px 20px;border-radius:9px;border:none;background:transparent;cursor:pointer;color:#888;font-family:inherit;display:flex;align-items:center;gap:7px;transition:all .15s}
.mode-btn.on{background:#1a1a1a;color:#fff}
.mode-btn.life.on{background:linear-gradient(135deg,#6366f1,#ec4899);color:#fff}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:20px}
.stat{background:#fff;border:1.5px solid #e8e8e6;border-radius:10px;padding:12px 14px}
.stat-val{font-size:22px;font-weight:600}
.stat-lbl{font-size:11px;color:#999;margin-top:2px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:4px}
.section-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;display:flex;align-items:center;gap:5px}
.section-line{flex:1;height:1px;background:#e8e8e6}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cb{font-size:12px;padding:5px 12px;border-radius:20px;border:1.5px solid #ddd;background:#fff;color:#666;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;font-family:inherit}
.cb.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff;font-weight:500}
.cb.life-mode.on{border-color:#6366f1;background:#6366f1;color:#fff}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.ac{background:#fff;border:1.5px solid #e8e8e6;border-radius:14px;display:flex;flex-direction:column;cursor:pointer;transition:all .15s}
.ac:hover{border-color:#999;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.ac.life-card:hover{border-color:#6366f1;box-shadow:0 2px 12px rgba(99,102,241,.12)}
.ac-top{display:flex;align-items:center;gap:10px;padding:13px 13px 0}
.ac-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:1.5px solid rgba(0,0,0,.07)}
.ac-name{font-size:13px;font-weight:600}
.ac-cat{font-size:11px;margin-top:2px;font-weight:500}
.ac-new{font-size:10px;padding:2px 6px;border-radius:4px;background:#fef3c7;color:#d97706;border:1px solid #fde68a;font-weight:600;margin-left:5px;vertical-align:middle}
.ac-div{height:1px;background:#f0f0ee;margin:9px 13px 0}
.ac-desc{font-size:12px;color:#666;line-height:1.55;padding:7px 13px}
.ac-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 13px 9px}
.atag{font-size:11px;padding:2px 7px;border-radius:6px;border:1.5px solid #ebebeb;color:#777;background:#f8f8f7;display:flex;align-items:center;gap:3px}
.ac-foot{border-top:1.5px solid #f0f0ee;padding:8px 13px;display:flex;align-items:center;justify-content:space-between}
.ac-lbl{font-size:11px;color:#aaa;display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:13px;grid-column:1/-1}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.52);display:none;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;z-index:100;overflow-y:auto}
.ov.vis{display:flex}
.mo{background:#fff;border:1.5px solid #e0e0e0;border-radius:16px;width:100%;max-width:720px;margin:auto}
.mo-head{display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1.5px solid #f0f0ee}
.mo-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;border:1.5px solid rgba(0,0,0,.07)}
.mo-title{font-size:15px;font-weight:600}
.mo-badge{display:inline-block;font-size:11px;margin-top:3px;padding:2px 8px;border-radius:6px;border:1.5px solid;font-weight:500}
.mo-close{margin-left:auto;background:#f5f5f3;border:1.5px solid #e0e0e0;cursor:pointer;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#666}
.mo-close:hover{background:#eee}
.tabs{display:flex;border-bottom:1.5px solid #f0f0ee;padding:0 18px;overflow-x:auto}
.tab{font-size:12px;padding:9px 14px;cursor:pointer;color:#888;border:none;border-bottom:2px solid transparent;margin-bottom:-1.5px;font-family:inherit;background:none;white-space:nowrap;transition:all .12s}
.tab.on{color:#1a1a1a;font-weight:600;border-bottom-color:#1a1a1a}
.tab-panel{display:none;padding:15px 18px;flex-direction:column;gap:13px}
.tab-panel.on{display:flex}
.mo-desc{font-size:13px;color:#555;line-height:1.65;padding:11px 13px;background:#f8f8f7;border:1.5px solid #ebebeb;border-radius:9px}
.slbl{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.tchip{font-size:12px;padding:5px 9px;border-radius:7px;border:1.5px solid #ebebeb;color:#555;background:#f8f8f7;display:flex;align-items:center;gap:5px}
.tchip i{font-size:13px;color:#aaa}
.prompts{display:flex;flex-direction:column;gap:8px}
.pb{border:1.5px solid #e8e8e6;border-radius:9px;overflow:hidden}
.pb-head{padding:7px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid #ebebeb;background:#f8f8f7}
.pb-lbl{font-size:12px;font-weight:600;color:#444;display:flex;align-items:center;gap:4px}
.pb-body{padding:9px 11px;font-size:12px;color:#333;line-height:1.65;font-family:'SF Mono',Consolas,monospace;white-space:pre-wrap;background:#fff}
.cpbtn{font-size:11px;padding:3px 9px;border-radius:6px;border:1.5px solid #ddd;background:#fff;color:#666;cursor:pointer;display:flex;align-items:center;gap:3px;font-family:inherit;transition:all .12s}
.cpbtn:hover{border-color:#999;color:#1a1a1a}
.cpbtn.ok{border-color:#22c55e;color:#16a34a;background:#f0fdf4}
.sys-block{border:1.5px solid #e8e8e6;border-radius:9px;overflow:hidden}
.sys-head{padding:7px 11px;background:#f8f8f7;border-bottom:1.5px solid #ebebeb;display:flex;align-items:center;justify-content:space-between}
.sys-lbl{font-size:12px;font-weight:600;color:#444;display:flex;align-items:center;gap:5px}
.sys-body{padding:11px;font-size:12px;color:#333;line-height:1.7;font-family:'SF Mono',Consolas,monospace;white-space:pre-wrap;background:#fff;max-height:300px;overflow-y:auto}
.pill-note{font-size:12px;color:#666;line-height:1.55;padding:9px 11px;background:#f8f8f7;border-radius:8px;border:1.5px solid #ebebeb}
.mo-foot{border-top:1.5px solid #f0f0ee;padding:11px 18px;display:flex;gap:8px;flex-wrap:wrap}
.mfb{font-size:12px;padding:8px 14px;border-radius:9px;border:1.5px solid #ddd;background:#f8f8f7;color:#444;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:all .15s;text-decoration:none}
.mfb:hover{border-color:#999;color:#1a1a1a}
.mfb.prim{background:#1a1a1a;border-color:#1a1a1a;color:#fff;font-weight:500}
.mfb.prim:hover{background:#333}
.mfb.green{background:#10a37f;border-color:#10a37f;color:#fff;font-weight:500}
.mfb.green:hover{background:#0d8f6e}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:10px;padding:10px 20px;font-size:13px;display:none;align-items:center;gap:8px;z-index:300;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.toast.show{display:flex}
@media(max-width:640px){.stats{grid-template-columns:repeat(3,1fr)}.tgrid{grid-template-columns:1fr}.tabs{overflow-x:auto}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1 class="dash-title">AI Executive & Life Team</h1>
      <div class="dash-sub" id="dsub">28 агентов · Бизнес + Жизнь · Claude + ChatGPT</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <a href="https://arena.ai/leaderboard/text" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:6px;font-size:12px;padding:7px 13px;border-radius:10px;border:1.5px solid #ddd;background:#fff;color:#444;text-decoration:none;font-weight:500;transition:all .15s" onmouseover="this.style.borderColor='#999'" onmouseout="this.style.borderColor='#ddd'">
        <i class="ti ti-trophy" style="font-size:14px;color:#d97706"></i>Таблица лидеров AI
      </a>
      <div class="sw">
        <i class="ti ti-search" style="font-size:14px;color:#aaa"></i>
        <input id="search" placeholder="Поиск по всем агентам..." oninput="renderAll()">
      </div>
    </div>
  </div>
  <div class="mode-bar">
    <button class="mode-btn on" id="mb-biz" onclick="setMode('biz')"><i class="ti ti-briefcase" style="font-size:15px"></i>Бизнес</button>
    <button class="mode-btn life" id="mb-life" onclick="setMode('life')"><i class="ti ti-heart" style="font-size:15px"></i>Жизнь</button>
    <button class="mode-btn" id="mb-all" onclick="setMode('all')"><i class="ti ti-layout-grid" style="font-size:15px"></i>Все</button>
    <button class="mode-btn" id="mb-gpts" onclick="setMode('gpts')" style="border-left:1.5px solid #eee;margin-left:2px"><i class="ti ti-brand-openai" style="font-size:15px"></i>Готовые GPT</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total">28</div><div class="stat-lbl">Всего агентов</div></div>
    <div class="stat"><div class="stat-val" id="s-biz">17</div><div class="stat-lbl">Бизнес</div></div>
    <div class="stat"><div class="stat-val" id="s-life">11</div><div class="stat-lbl">Жизнь</div></div>
    <div class="stat"><div class="stat-val">3</div><div class="stat-lbl">Платформы</div></div>
    <div class="stat"><div class="stat-val" id="s-show">28</div><div class="stat-lbl">Показано</div></div>
  </div>
  <div class="cats" id="cats"></div>
  <div id="main-grid"></div>
  <div id="gpts-grid" style="display:none"></div>
</div>

<div class="ov" id="ov" onclick="maybeClose(event)">
  <div class="mo">
    <div class="mo-head">
      <div class="mo-ico" id="m-ico"></div>
      <div><div class="mo-title" id="m-title"></div><span class="mo-badge" id="m-badge"></span></div>
      <button class="mo-close" onclick="closeModal()"><i class="ti ti-x" style="font-size:14px"></i></button>
    </div>
    <div class="tabs" id="m-tabs"></div>
    <div class="tab-panel on" id="tp0"></div>
    <div class="tab-panel" id="tp1"></div>
    <div class="tab-panel" id="tp2"></div>
    <div class="tab-panel" id="tp3"></div>
    <div class="mo-foot" id="m-foot"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const BIZ_CATS=[
  {name:"Стратегия",dot:"#534AB7",bg:"#EEEDFE",tc:"#3C3489"},
  {name:"Команда",dot:"#0F6E56",bg:"#E1F5EE",tc:"#085041"},
  {name:"Риски",dot:"#993C1D",bg:"#FAECE7",tc:"#712B13"},
  {name:"Коммуникации",dot:"#854F0B",bg:"#FAEEDA",tc:"#633806"},
  {name:"Рост",dot:"#3B6D11",bg:"#EAF3DE",tc:"#27500A"},
  {name:"Операции",dot:"#993556",bg:"#FBEAF0",tc:"#72243E"},
];
const LIFE_CATS=[
  {name:"Здоровье",dot:"#dc2626",bg:"#FEF2F2",tc:"#991b1b"},
  {name:"Путешествия",dot:"#0369a1",bg:"#E0F2FE",tc:"#075985"},
  {name:"Личные финансы",dot:"#059669",bg:"#ECFDF5",tc:"#065f46"},
  {name:"Обучение",dot:"#7c3aed",bg:"#F5F3FF",tc:"#5b21b6"},
  {name:"Семья",dot:"#db2777",bg:"#FDF2F8",tc:"#9d174d"},
  {name:"Творчество",dot:"#d97706",bg:"#FFFBEB",tc:"#92400e"},
];
function mkA(t,cat,icon,bg,ic,isNew,desc,tasks,prompts,start,system,howto){
  return {title:t,cat,icon,bg,ic,isNew,desc,tasks,prompts,start,system,howto};
}
const BIZ=[
  mkA("CFO — Финансовый директор","Стратегия","ti-chart-bar","#E6F1FB","#185FA5",false,
    "Анализирует P&L, EBITDA, cash flow. Защищает прибыльность, контролирует runway, выявляет финансовые риски до того, как они становятся проблемой.",
    [{i:"ti-file-analytics",t:"P&L анализ"},{i:"ti-trending-up",t:"Прогноз выручки"},{i:"ti-dashboard",t:"KPI дашборд"},{i:"ti-arrows-split",t:"Сценарии"},{i:"ti-cash",t:"Cash flow"},{i:"ti-chart-pie",t:"EBITDA"}],
    [{lbl:"Анализ P&L",txt:"Вот данные P&L за Q1–Q3 2024. Выяви три главные причины падения маржи, оцени динамику по каждой статье и дай рекомендации. Формат: executive summary на 1 страницу."},
     {lbl:"Прогноз выручки",txt:"Выручка за последние 12 месяцев: [данные]. Построй прогноз на 2 квартала с учётом сезонности. Три сценария: base / bull / bear с ключевыми допущениями."},
     {lbl:"KPI для совета",txt:"Подготовь набор из 8–10 KPI для ежемесячного отчёта совету директоров. Для каждого: описание, как считать, целевое значение, сигналы тревоги."}],
    "Ты — CFO мирового уровня с опытом Big4 и PE. Помоги разобраться с финансовой отчётностью и KPI. Начни с уточняющих вопросов: какие данные есть и что нужно проанализировать.",
    "Ты — CFO мирового уровня с опытом Big4, инвестиционного банкинга и PE.\n\nПриоритеты: EBITDA, Cash Flow, Runway, ROI, Unit Economics, Gross Margin.\n\nВсегда: сначала вывод, затем цифры; выделяй риски; показывай влияние на EBITDA и cash flow; предлагай несколько сценариев.\n\nФормат:\n# Executive Summary\n# Key Financial Insights\n# Risks\n# Scenario Analysis\n# Recommendations\n# KPI Impact\n# Next Actions",
    "Используй ежемесячно для финансового обзора и перед board meeting. Опиши ситуацию — агент задаст уточняющие вопросы."),
  mkA("Strategy — Стратегический советник","Стратегия","ti-bulb","#EEEDFE","#534AB7",false,
    "Стратегический советник уровня McKinsey/BCG. Помогает формировать стратегию, находить точки роста, анализировать конкурентов и строить OKR.",
    [{i:"ti-analyze",t:"SWOT"},{i:"ti-target",t:"OKR"},{i:"ti-tournament",t:"Конкуренты"},{i:"ti-users-group",t:"Стратсессия"},{i:"ti-compass",t:"Позиционирование"},{i:"ti-git-fork",t:"Porter 5 Forces"}],
    [{lbl:"SWOT + стратегия",txt:"Проведи SWOT нашей компании: [описание бизнеса, рынка, конкурентов]. На основе SWOT предложи 3 стратегических приоритета на год с обоснованием."},
     {lbl:"OKR на квартал",txt:"Стратегические цели на год: [цели]. Разработай OKR на Q2 (3 Objective, 3–4 KR к каждому). KR должны быть измеримы и амбициозны."},
     {lbl:"Анализ конкурентов",txt:"Данные о 4 главных конкурентах: [данные]. Проведи сравнительный анализ: позиционирование, ценообразование, сильные/слабые стороны. Где наши окна возможностей?"}],
    "Ты — стратегический советник CEO уровня McKinsey/BCG. Помоги со стратегией. Начни с вопросов: что за бизнес, рынок, горизонт планирования и что беспокоит больше всего.",
    "Ты — стратегический советник CEO уровня McKinsey, BCG, Bain.\n\nВсегда: используй frameworks; показывай trade-offs; думай на 3–5 лет вперёд.\n\nИспользуй: SWOT, Porter 5 Forces, Blue Ocean, JTBD, TAM/SAM/SOM, Growth loops.\n\nФормат:\n# Strategic Context\n# Market Dynamics\n# Competitive Landscape\n# Opportunities\n# Risks\n# Strategic Options\n# Recommended Strategy\n# Next Strategic Moves",
    "Используй перед стратегической сессией. Опиши бизнес, рынок и конкурентов в первом сообщении."),
  mkA("M&A — Советник по сделкам","Стратегия","ti-building-skyscraper","#EEEDFE","#534AB7",false,
    "M&A advisor с опытом инвестбанкинга и PE. Помогает оценивать сделки, проводить due diligence, анализировать синергии и выявлять скрытые риски.",
    [{i:"ti-clipboard-check",t:"Due diligence"},{i:"ti-calculator",t:"Оценка"},{i:"ti-file-description",t:"Тизер"},{i:"ti-sitemap",t:"Структура"},{i:"ti-filter",t:"Скрининг"},{i:"ti-puzzle",t:"Integration"}],
    [{lbl:"Due diligence чеклист",txt:"Рассматриваем приобретение в [отрасль], выручка ~[X] млн. Составь детальный чеклист DD: финансовый, юридический, операционный, HR и технологический блоки."},
     {lbl:"Оценка по мультипликаторам",txt:"Показатели целевой компании: [данные]. Оцени стоимость методом мультипликаторов (EV/EBITDA, EV/Revenue, P/E). Укажи диапазон и корректировки."},
     {lbl:"Инвестиционный тизер",txt:"Подготовь одностраничный тизер: [описание компании-цели]. Включи: investment highlights, финансовый снэпшот, стратегическую логику сделки."}],
    "Ты — M&A советник с опытом в инвестбанкинге и PE. Помоги с анализом потенциальной сделки. Расскажи: что за компания-цель, стадия переговоров и что нужно подготовить.",
    "Ты — M&A advisor с опытом инвестбанкинга, PE и corporate development.\n\nВсегда: оценивай downside scenarios; выявляй integration risks; оценивай synergy realism.\n\nИспользуй: EV/EBITDA, DCF, comparable companies, synergy mapping, PMI frameworks.\n\nФормат:\n# Deal Summary\n# Strategic Rationale\n# Financial Analysis\n# Valuation\n# Synergies\n# Risks\n# Deal Recommendation\n# Integration Priorities",
    "Используй при оценке любой сделки. Опиши компанию-цель и стратегическую логику."),
  mkA("Tax & Legal — Налоги и право","Риски","ti-receipt-tax","#FAECE7","#993C1D",true,
    "Эксперт по налоговому планированию и корпоративному праву. Помогает оптимизировать налоговую нагрузку, выбрать структуру бизнеса и снизить правовые риски.",
    [{i:"ti-file-invoice",t:"Налоговое планирование"},{i:"ti-building-bank",t:"Структура бизнеса"},{i:"ti-receipt",t:"НДС и налоги"},{i:"ti-scale",t:"Корп. право"},{i:"ti-transfer",t:"Трансфер. цены"},{i:"ti-world",t:"Международное право"}],

function setMode(m){
  mode=m; activeCat="Все";
  document.getElementById("search").value="";
  ["biz","life","all","gpts"].forEach(x=>{
    const b=document.getElementById("mb-"+x);
    if(b)b.classList.toggle("on",x===m);
  });
  document.getElementById("mb-life").classList.add("life");
  const isGpts=m==="gpts";
  document.getElementById("main-grid").style.display=isGpts?"none":"";
  document.getElementById("gpts-grid").style.display=isGpts?"":"none";
  if(isGpts){buildGptCats();renderGPTs();}
  else{buildCats();render();}
}

function buildGptCats(){
  document.getElementById("cats").innerHTML=GPT_CATS.map(n=>{
    const dots={Стратегия:"#534AB7",Финансы:"#185FA5",Маркетинг:"#3B6D11",Исследования:"#16a34a",Дизайн:"#f59e0b",Все:"#888"};
    return `<button class="cb ${n===activeCat?"on":""}" onclick="setGptCat('${n}')"><span class="cdot" style="background:${dots[n]||"#888"}"></span>${n}</button>`;
  }).join("");
}
function setGptCat(n){activeCat=n;buildGptCats();renderGPTs();}

  const q=document.getElementById("search").value.toLowerCase();
  const f=GPTS.filter(g=>(activeCat==="Все"||g.cat===activeCat)&&(!q||g.title.toLowerCase().includes(q)||g.cat.toLowerCase().includes(q)||g.desc.toLowerCase().includes(q)));
  document.getElementById("s-show").textContent=f.length;

    ${isMusicAgent?`<a class="mfb" style="background:#8b5cf6;border-color:#8b5cf6;color:#fff;font-weight:500" href="https://suno.com/create" target="_blank" rel="noopener"><i class="ti ti-music" style="font-size:14px"></i>Открыть Suno</a>`:""}
    ${isVideoAgent?`<a class="mfb" style="background:#0ea5e9;border-color:#0ea5e9;color:#fff;font-weight:500" href="https://ai.byteplus.com/" target="_blank" rel="noopener"><i class="ti ti-video" style="font-size:14px"></i>Открыть BytePlus AI</a>`:""}
    <a class="mfb" href="https://chat.openai.com" target="_blank" rel="noopener"><i class="ti ti-brand-openai" style="font-size:14px"></i>ChatGPT</a>
    <a class="mfb" href="https://claude.ai/new" target="_blank" rel="noopener"><i class="ti ti-robot" style="font-size:14px"></i>Claude</a>`;
  switchTab(0);
  document.getElementById("ov").classList.add("vis");
}

function switchTab(n){
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("on",i===n));
  document.querySelectorAll(".tab-panel").forEach((p,i)=>p.classList.toggle("on",i===n));
}

// Universal clipboard copy with iOS Safari / file:// fallback
// iOS Safari requires execCommand('copy') to run SYNCHRONOUSLY inside the
// click handler — no async/await/promise chain before it, or it silently fails.
// So we try execCommand FIRST (sync), and only use the async Clipboard API
// as a secondary attempt if execCommand isn't available at all.
function doCopySync(text){
  // iOS Safari works best when copy happens synchronously inside the tap/click.
  let ta=null;
  try{
    ta=document.createElement("textarea");
    ta.value=text||"";
    ta.setAttribute("readonly","");
    ta.style.position="fixed";
    ta.style.top="0";
    ta.style.left="0";
    ta.style.width="2px";
    ta.style.height="2px";
    ta.style.padding="0";
    ta.style.border="0";
    ta.style.outline="0";
    ta.style.boxShadow="none";
    ta.style.background="transparent";
    ta.style.fontSize="16px"; // prevents iOS zoom
    ta.style.opacity="0.01";  // not fully hidden; iOS may reject opacity:0
    document.body.appendChild(ta);

    ta.focus();
    ta.select();
    ta.setSelectionRange(0,ta.value.length);

    const ok=document.execCommand("copy");
    return !!ok;
  }catch(e){
    return false;
  }finally{
    if(ta&&ta.parentNode)ta.parentNode.removeChild(ta);
    if(window.getSelection){
      const sel=window.getSelection();
      if(sel)sel.removeAllRanges();
    }
  }
}

function doCopy(text,onDone){
  // 1) Try synchronous execCommand FIRST — this is what makes iOS Safari work,
  //    because it must happen directly inside the click handler.
  const syncOk=doCopySync(text);
  if(syncOk){onDone(true);return;}
  // 2) Fallback to modern async Clipboard API (covers some edge browsers)
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>onDone(true)).catch(()=>onDone(false));
  } else {
    onDone(false);
  }
}

function copyElText(elId,btnId){
  const el=document.getElementById(elId);
  if(!el)return;
  const txt=el.tagName==="TEXTAREA"?el.value:el.textContent;
  doCopy(txt,(ok)=>{
    if(ok){showToast("✓ Скопировано — вставь в Custom Instructions");if(btnId)markCopied(btnId);}
    else{showToast("Не удалось скопировать — выдели текст вручную и используй Copy");}
  });
}
function copyEl(elId,btnId){
  const el=document.getElementById(elId);
  if(!el)return;
  doCopy(el.textContent,(ok)=>{
    if(ok){showToast("✓ Скопировано — вставь в Claude или ChatGPT");if(btnId)markCopied(btnId);}
    else{showToast("Не удалось скопировать — выдели текст вручную и используй Copy");}
  });
}
function markCopied(btnId){
  const b=document.getElementById(btnId);
  if(!b)return;
  b.innerHTML='<i class="ti ti-check" style="font-size:11px"></i> ОК';
  b.classList.add("ok");
  setTimeout(()=>{b.innerHTML='<i class="ti ti-copy" style="font-size:11px"></i> Копировать';b.classList.remove("ok");},2000);
}

let tt=null;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2800);}
function closeModal(){document.getElementById("ov").classList.remove("vis");}
function maybeClose(e){if(e.target===document.getElementById("ov"))closeModal();}

document.getElementById("s-biz").textContent=BIZ.length;
document.getElementById("s-life").textContent=LIFE.length;
buildCats();render();
